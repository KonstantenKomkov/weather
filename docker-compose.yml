services:
  db:
    image: postgres:16-alpine
    container_name: weather_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weather_db}
      POSTGRES_USER: ${POSTGRES_USER:-weather_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather_password}
    volumes:
      - ${POSTGRES_DATA_PATH:-./.docker/postgres_data}:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weather_user} -d ${POSTGRES_DB:-weather_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: weather_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_web
    restart: unless-stopped
    command:
      [
        "sh",
        "/app/docker-entrypoint.sh",
        "gunicorn",
        "weather.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--reload",
      ]
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_celery
    restart: unless-stopped
    command: ["sh", "/app/docker-entrypoint.sh", "celery", "-A", "weather", "worker", "-l", "info"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather_celery_beat
    restart: unless-stopped
    command: ["sh", "/app/docker-entrypoint.sh", "celery", "-A", "weather", "beat", "-l", "info"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
