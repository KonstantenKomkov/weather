services:
  db:
    image: postgres:16-alpine
    container_name: weather_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weather_db}
      POSTGRES_USER: ${POSTGRES_USER:-weather_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather_password}
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weather_user} -d ${POSTGRES_DB:-weather_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: weather_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    image: weather-app
    container_name: weather_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "false"
      COLLECT_STATIC: "1"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    image: weather-app
    container_name: weather_celery
    restart: unless-stopped
    command: ["sh", "/app/docker-entrypoint-prod.sh", "celery", "-A", "weather", "worker", "-l", "info"]
    env_file:
      - .env
    environment:
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    image: weather-app
    container_name: weather_celery_beat
    restart: unless-stopped
    command: ["sh", "/app/docker-entrypoint-prod.sh", "celery", "-A", "weather", "beat", "-l", "info"]
    env_file:
      - .env
    environment:
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  redis_data:
