# Deploy to prod (опционально — настроить secrets в GitHub).
# Secrets: DEPLOY_SSH_KEY, DEPLOY_HOST, DEPLOY_USER.
# Первичная настройка — documents/deployment.md

name: Deploy to prod

on:
  workflow_dispatch:

concurrency:
  group: weather-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy → VPS
        env:
          SSH_HOST: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
        run: |
          export SSH_KEY="$HOME/.ssh/deploy_key"
          chmod +x scripts/update_prod_code.sh
          ./scripts/update_prod_code.sh --ci
